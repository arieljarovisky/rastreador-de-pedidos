<!doctype html>
<html lang="es" data-theme="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>Posta | Rastreo de Pedidos</title>
    <!-- Leaflet CSS for Interactive Map -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />
    <!-- PWA Manifest & Theme Color -->
    <link rel="manifest" href="/manifest.json" />
    <link rel="icon" type="image/svg+xml" href="/icon-posta.svg" />
    <link rel="apple-touch-icon" href="/icon-192.svg" />
    <meta name="theme-color" content="#141210" />
    <script>
    (function(){
      var landing=localStorage.getItem('posta-theme');
      var legacy=localStorage.getItem('posta_theme');
      var theme='dark';
      if(landing==='light')theme='paper';
      else if(landing==='dark')theme='dark';
      else if(legacy==='paper'||legacy==='dark')theme=legacy;
      var root=document.documentElement;
      root.setAttribute('data-theme',theme);
      root.classList.toggle('theme-dark',theme==='dark');
      root.classList.toggle('theme-paper',theme==='paper');
    })();
    </script>
    <!-- Apple Mobile Support -->
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Posta" />
  </head>
  <body class="antialiased font-sans">
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
